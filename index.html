<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NexMobile Exchange</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1020;
  color:#e5e7eb;
}

/* MOBILE APP FRAME */
.app{
  max-width:420px;
  margin:auto;
  height:100vh;
  background:#0f172a;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  padding:15px;
  background:#111c33;
  text-align:center;
  color:#38bdf8;
  font-weight:bold;
}

/* SCREENS */
.screen{
  flex:1;
  padding:10px;
  overflow:auto;
}

/* CARD */
.card{
  background:#111c33;
  padding:12px;
  border-radius:12px;
  margin:10px 0;
}

/* INPUTS */
input,button,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}

button{
  background:#38bdf8;
  color:#000;
  font-weight:bold;
}

/* NAV BAR */
.nav{
  display:flex;
  justify-content:space-around;
  background:#0b1220;
  padding:10px;
  border-top:1px solid #1f2a44;
}

.nav button{
  width:30%;
}
</style>
</head>

<body>

<div class="app">

  <div class="header">🚀 NexMobile Exchange</div>

  <!-- AUTH -->
  <div id="auth" class="screen">

    <div class="card">
      <h3>Login</h3>
      <input id="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">

      <button onclick="login()">Login</button>
      <button onclick="register()">Register</button>
    </div>

  </div>

  <!-- APP -->
  <div id="appScreen" class="screen" style="display:none;">

    <div class="card">
      <h3>👤 User</h3>
      <p id="user"></p>
    </div>

    <div class="card">
      <h3>💰 Balance</h3>
      <p>$<span id="balance">0</span></p>
      <button onclick="deposit()">+100 Deposit</button>
    </div>

    <div class="card">
      <h3>📊 Market</h3>
      <p>BTC: <span id="btc">50000</span></p>
      <p>ETH: <span id="eth">3000</span></p>
      <p>SOL: <span id="sol">120</span></p>
    </div>

    <div class="card">
      <h3>📈 Trade</h3>

      <select id="coin">
        <option>BTC</option>
        <option>ETH</option>
        <option>SOL</option>
      </select>

      <input id="amount" type="number" placeholder="Amount">

      <button onclick="buy()">BUY</button>
      <button onclick="sell()">SELL</button>
    </div>

    <div class="card">
      <h3>📥 Deposit Wallet</h3>
      <p id="wallet" style="color:#38bdf8;"></p>
    </div>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 TU FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH_DOMAIN",
  projectId: "TU_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

/* MARKET */
let market = { BTC:50000, ETH:3000, SOL:120 };

/* WALLET */
let wallet = { balance:0, assets:{BTC:0,ETH:0,SOL:0} };

/* WALLET ADDRESS */
let address = "NX-" + Math.random().toString(36).substring(2,10).toUpperCase();
document.getElementById("wallet").innerText = address;

/* MARKET LIVE */
setInterval(()=>{
  for(let c in market){
    market[c] += (Math.random()-0.5)*market[c]*0.01;
    document.getElementById(c.toLowerCase()).innerText = market[c].toFixed(2);
  }
},3000);

/* AUTH */
window.register = async ()=>{
  const u = await createUserWithEmailAndPassword(auth,email.value,password.value);
  await setDoc(doc(db,"users",u.user.uid),wallet);
};

window.login = ()=>{
  signInWithEmailAndPassword(auth,email.value,password.value);
};

/* SESSION */
onAuthStateChanged(auth, async (user)=>{
  if(user){
    document.getElementById("auth").style.display="none";
    document.getElementById("appScreen").style.display="block";
    document.getElementById("user").innerText=user.email;

    load(user);
  }else{
    document.getElementById("auth").style.display="block";
    document.getElementById("appScreen").style.display="none";
  }
});

let currentUser;

/* LOAD */
async function load(user){
  currentUser=user;

  let ref=doc(db,"users",user.uid);
  let snap=await getDoc(ref);

  wallet=snap.data();

  update();
}

/* DEPOSIT */
window.deposit = async ()=>{
  let ref=doc(db,"users",currentUser.uid);
  wallet.balance+=100;
  await updateDoc(ref,wallet);
  update();
};

/* BUY */
window.buy = async ()=>{
  let coin=coinSel();
  let amt=Number(amount());

  let cost=market[coin]*amt;

  if(wallet.balance>=cost){
    wallet.balance-=cost;
    wallet.assets[coin]+=amt;

    await save();
    update();
  }
};

/* SELL */
window.sell = async ()=>{
  let coin=coinSel();
  let amt=Number(amount());

  if(wallet.assets[coin]>=amt){
    wallet.assets[coin]-=amt;
    wallet.balance+=market[coin]*amt;

    await save();
    update();
  }
};

async function save(){
  let ref=doc(db,"users",currentUser.uid);
  await updateDoc(ref,wallet);
}

function update(){
  document.getElementById("balance").innerText=wallet.balance.toFixed(2);
}

function coinSel(){ return document.getElementById("coin").value; }
function amount(){ return document.getElementById("amount").value; }

</script>

</body>
</html>
