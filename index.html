<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NexExchange Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#070d1a;
  color:white;
}

header{
  background:#111c33;
  padding:15px;
  text-align:center;
  color:#00e5ff;
  font-weight:bold;
}

.container{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  padding:10px;
}

.box{
  background:#111c33;
  padding:15px;
  border-radius:10px;
}

input,button,select{
  padding:8px;
  margin:5px;
  border:none;
  border-radius:6px;
}

button{
  background:#00e5ff;
  cursor:pointer;
}

.price{
  color:#00e5ff;
}
</style>
</head>

<body>

<header>🚀 NexExchange PRO (SIMULATOR)</header>

<!-- AUTH -->
<div id="auth" class="box" style="margin:10px;">
  <h3>Login / Register</h3>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="container">

  <!-- MARKET -->
  <div class="box">
    <h3>📊 Market</h3>
    <p>BTC: $<span id="btc">50000</span></p>
    <p>ETH: $<span id="eth">3000</span></p>
    <p>SOL: $<span id="sol">120</span></p>
  </div>

  <!-- WALLET -->
  <div class="box">
    <h3>💰 Wallet</h3>
    <p id="user"></p>
    <p>Balance: $<span id="balance">0</span></p>
    <button onclick="addMoney()">+100 Demo</button>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- TRADE -->
  <div class="box">
    <h3>📈 Trade</h3>

    <select id="coin">
      <option>BTC</option>
      <option>ETH</option>
      <option>SOL</option>
    </select>

    <input id="amount" type="number" placeholder="Amount">

    <button onclick="buy()">BUY</button>
    <button onclick="sell()">SELL</button>

    <p id="assets"></p>
  </div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 TU FIREBASE CONFIG (EL TUYO) */
const firebaseConfig = {
  apiKey: "AIzaSyD2e9BtERsCm6n6mAlj6Ll6c7GMcWzc0uE",
  authDomain: "nexwallet-312d9.firebaseapp.com",
  projectId: "nexwallet-312d9",
  storageBucket: "nexwallet-312d9.firebasestorage.app",
  messagingSenderId: "1070652152586",
  appId: "1:1070652152586:web:e82236c52d783b06d578f3",
  measurementId: "G-QHRD1ZWJYH"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

/* 🌍 MARKET SIMULATION */
let market = {
  BTC: 50000,
  ETH: 3000,
  SOL: 120
};

/* LIVE MARKET */
setInterval(()=>{
  for(let c in market){
    market[c] += (Math.random()-0.5)*market[c]*0.01;
    document.getElementById(c.toLowerCase()).innerText = market[c].toFixed(2);
  }
},3000);

/* REGISTER */
window.register = async ()=>{
  const u = await createUserWithEmailAndPassword(auth,email.value,password.value);

  await setDoc(doc(db,"users",u.user.uid),{
    balance:0,
    assets:{BTC:0,ETH:0,SOL:0}
  });
};

/* LOGIN */
window.login = ()=>{
  signInWithEmailAndPassword(auth,email.value,password.value);
};

/* LOGOUT */
window.logout = ()=> signOut(auth);

/* SESSION */
onAuthStateChanged(auth, async (user)=>{
  if(user){
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";

    document.getElementById("user").innerText=user.email;

    loadUser(user);
  }else{
    document.getElementById("auth").style.display="block";
    document.getElementById("app").style.display="none";
  }
});

let currentUser;

/* LOAD USER */
async function loadUser(user){
  currentUser = user;

  let ref = doc(db,"users",user.uid);
  let snap = await getDoc(ref);

  updateUI(snap.data());
}

/* UPDATE UI */
function updateUI(data){
  document.getElementById("balance").innerText = data.balance;

  document.getElementById("assets").innerText =
  `BTC:${data.assets.BTC} ETH:${data.assets.ETH} SOL:${data.assets.SOL}`;
}

/* ADD DEMO MONEY */
window.addMoney = async ()=>{
  let ref = doc(db,"users",currentUser.uid);
  let snap = await getDoc(ref);

  let b = snap.data().balance + 100;

  await updateDoc(ref,{balance:b});

  loadUser(currentUser);
};

/* BUY */
window.buy = async ()=>{
  let coin = coinSel();
  let amt = Number(amount());

  let ref = doc(db,"users",currentUser.uid);
  let snap = await getDoc(ref);

  let data = snap.data();
  let cost = market[coin]*amt;

  if(data.balance >= cost){
    data.balance -= cost;
    data.assets[coin] += amt;

    await updateDoc(ref,data);
    loadUser(currentUser);
  }
};

/* SELL */
window.sell = async ()=>{
  let coin = coinSel();
  let amt = Number(amount());

  let ref = doc(db,"users",currentUser.uid);
  let snap = await getDoc(ref);

  let data = snap.data();

  if(data.assets[coin] >= amt){
    data.assets[coin] -= amt;
    data.balance += market[coin]*amt;

    await updateDoc(ref,data);
    loadUser(currentUser);
  }
};

function coinSel(){ return document.getElementById("coin").value; }
function amount(){ return document.getElementById("amount").value; }

</script>

</body>
</html>
