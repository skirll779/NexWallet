<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NexTerminal Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#050914;
  color:#fff;
}

/* TOP BAR */
.topbar{
  background:#0b1220;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #1f2a44;
}

.logo{
  color:#00e5ff;
  font-weight:bold;
  font-size:18px;
}

/* LAYOUT */
.grid{
  display:grid;
  grid-template-columns:1fr 2fr 1fr;
  height:calc(100vh - 50px);
}

/* PANELS */
.panel{
  background:#0b1220;
  border-right:1px solid #1f2a44;
  padding:10px;
  overflow:auto;
}

.center{
  background:#070d1a;
  padding:10px;
}

/* CARDS */
.card{
  background:#111c33;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}

/* BUTTONS */
button,input,select{
  padding:8px;
  margin:4px;
  border:none;
  border-radius:6px;
}

button{
  background:#00e5ff;
  cursor:pointer;
}

/* CHART STYLE */
.bar{
  height:6px;
  margin:2px;
  background:#00e5ff;
  border-radius:4px;
}

/* MARKET ROW */
.row{
  display:flex;
  justify-content:space-between;
  padding:6px;
  border-bottom:1px solid #1f2a44;
  font-size:13px;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">🚀 NexTerminal PRO</div>
  <div>SIMULATED TRADING ENVIRONMENT</div>
</div>

<div class="grid">

<!-- LEFT PANEL -->
<div class="panel">

  <h3>📊 Market</h3>

  <div class="row"><span>BTC</span><span id="btc">50000</span></div>
  <div class="row"><span>ETH</span><span id="eth">3000</span></div>
  <div class="row"><span>SOL</span><span id="sol">120</span></div>

  <h3>📈 Chart</h3>
  <div id="chart"></div>

</div>

<!-- CENTER PANEL -->
<div class="center">

  <div class="card">
    <h3>📈 Trading Panel</h3>

    <select id="coin">
      <option>BTC</option>
      <option>ETH</option>
      <option>SOL</option>
    </select>

    <input id="amount" type="number" placeholder="Amount">

    <button onclick="buy()">BUY</button>
    <button onclick="sell()">SELL</button>

    <p id="orders"></p>
  </div>

</div>

<!-- RIGHT PANEL -->
<div class="panel">

  <h3>💰 Wallet</h3>

  <p>User: <span id="user">Guest</span></p>
  <p>Balance: $<span id="balance">0</span></p>

  <button onclick="addMoney()">+100 Demo</button>

  <h3>Assets</h3>
  <p id="assets"></p>

</div>

</div>

<script>

/* MARKET ENGINE */
let market = {
  BTC: 50000,
  ETH: 3000,
  SOL: 120
};

/* WALLET */
let wallet = {
  balance: 0,
  assets: {BTC:0,ETH:0,SOL:0}
};

/* ORDERS */
let orders = [];

/* LIVE MARKET */
setInterval(()=>{
  for(let c in market){
    market[c] += (Math.random()-0.5)*market[c]*0.01;
    document.getElementById(c.toLowerCase()).innerText = market[c].toFixed(2);
  }

  drawChart();
},2000);

/* CHART SIMULATION */
function drawChart(){
  let chart = document.getElementById("chart");
  chart.innerHTML = "";

  for(let i=0;i<15;i++){
    let h = Math.random()*80 + 10;
    chart.innerHTML += `<div class="bar" style="width:${h}px"></div>`;
  }
}

/* ADD MONEY */
function addMoney(){
  wallet.balance += 100;
  update();
}

/* BUY */
function buy(){
  let coin = document.getElementById("coin").value;
  let amt = Number(document.getElementById("amount").value);

  let cost = market[coin]*amt;

  if(wallet.balance >= cost){
    wallet.balance -= cost;
    wallet.assets[coin] += amt;

    orders.push("BUY "+amt+" "+coin);
    update();
  }
}

/* SELL */
function sell(){
  let coin = document.getElementById("coin").value;
  let amt = Number(document.getElementById("amount").value);

  if(wallet.assets[coin] >= amt){
    wallet.assets[coin] -= amt;
    wallet.balance += market[coin]*amt;

    orders.push("SELL "+amt+" "+coin);
    update();
  }
}

/* UPDATE UI */
function update(){
  document.getElementById("balance").innerText = wallet.balance.toFixed(2);

  document.getElementById("assets").innerText =
  `BTC:${wallet.assets.BTC} ETH:${wallet.assets.ETH} SOL:${wallet.assets.SOL}`;

  document.getElementById("orders").innerText =
  orders.slice(-5).join("\n");
}

update();

</script>

</body>
</html>
