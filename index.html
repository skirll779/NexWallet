<!DOCTYPE html>
<html>
<head>
<title>NexExchange Ultra Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#070d1a;
  color:white;
}

.header{
  background:#111c33;
  padding:15px;
  text-align:center;
  color:#00e5ff;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:1fr 2fr 1fr;
  gap:10px;
  padding:10px;
}

.box{
  background:#111c33;
  padding:10px;
  border-radius:10px;
}

button,input,select{
  padding:8px;
  margin:5px;
  border:none;
  border-radius:6px;
}

button{
  background:#00e5ff;
  cursor:pointer;
}

/* simple chart */
.bar{
  height:10px;
  margin:2px;
  background:#00e5ff;
}
</style>
</head>

<body>

<div class="header">🚀 NexExchange ULTRA PRO (SIMULATOR)</div>

<!-- AUTH -->
<div id="auth" class="box" style="margin:10px;">
  <h3>Login / Register</h3>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="grid">

  <!-- MARKET -->
  <div class="box">
    <h3>📊 Market</h3>
    <p>BTC: $<span id="btc">50000</span></p>
    <p>ETH: $<span id="eth">3000</span></p>
    <p>SOL: $<span id="sol">120</span></p>

    <h4>Mini Chart</h4>
    <div id="chart"></div>
  </div>

  <!-- TRADING -->
  <div class="box">
    <h3>📈 Trade Panel</h3>

    <select id="coin">
      <option>BTC</option>
      <option>ETH</option>
      <option>SOL</option>
    </select>

    <input id="amount" type="number" placeholder="Amount">

    <button onclick="buy()">BUY</button>
    <button onclick="sell()">SELL</button>

    <h4>Order Book</h4>
    <div id="orders"></div>
  </div>

  <!-- WALLET -->
  <div class="box">
    <h3>💰 Wallet</h3>
    <p id="user"></p>
    <p>Balance: $<span id="balance">0</span></p>

    <button onclick="addMoney()">+100 Demo</button>
    <button onclick="logout()">Logout</button>

    <h4>Assets</h4>
    <p id="assets"></p>
  </div>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH",
  projectId: "TU_PROJECT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

/* MARKET ENGINE */
let market = {
  BTC: 50000,
  ETH: 3000,
  SOL: 120
};

/* ORDER BOOK */
let orders = [];

/* MARKET LIVE */
setInterval(()=>{
  for(let c in market){
    market[c] += (Math.random()-0.5)*market[c]*0.01;
    document.getElementById(c.toLowerCase()).innerText = market[c].toFixed(2);
  }

  drawChart();
},2000);

/* CHART */
function drawChart(){
  let chart = document.getElementById("chart");
  chart.innerHTML = "";

  for(let i=0;i<10;i++){
    let h = Math.random()*80 + 10;
    chart.innerHTML += `<div class='bar' style='width:${h}px'></div>`;
  }
}

/* AUTH */
window.register = async ()=>{
  let u = await createUserWithEmailAndPassword(auth,email.value,password.value);
  await setDoc(doc(db,"users",u.user.uid),{
    balance:0,
    assets:{BTC:0,ETH:0,SOL:0}
  });
};

window.login = ()=> signInWithEmailAndPassword(auth,email.value,password.value);
window.logout = ()=> signOut(auth);

/* SESSION */
onAuthStateChanged(auth, async (user)=>{
  if(user){
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("user").innerText=user.email;

    load(user);
  }else{
    document.getElementById("auth").style.display="block";
    document.getElementById("app").style.display="none";
  }
});

let currentUser;

async function load(user){
  currentUser = user;
  let ref = doc(db,"users",user.uid);
  let snap = await getDoc(ref);

  updateUI(snap.data());
}

function updateUI(data){
  document.getElementById("balance").innerText=data.balance;
  document.getElementById("assets").innerText=
  `BTC:${data.assets.BTC} ETH:${data.assets.ETH} SOL:${data.assets.SOL}`;

  document.getElementById("orders").innerHTML =
  orders.slice(-5).map(o=>`<p>${o}</p>`).join("");
}

/* ADD MONEY */
window.addMoney = async ()=>{
  let ref = doc(db,"users",currentUser.uid);
  let snap = await getDoc(ref);

  let b = snap.data().balance + 100;
  await updateDoc(ref,{balance:b});

  updateUI({...snap.data(),balance:b});
};

/* BUY */
window.buy = async ()=>{
  let coin = coinSel();
  let amt = Number(amount());

  let ref = doc(db,"users",currentUser.uid);
  let snap = await getDoc(ref);

  let cost = market[coin]*amt;

  let data = snap.data();

  if(data.balance >= cost){
    data.balance -= cost;
    data.assets[coin] += amt;

    orders.push("BUY "+amt+" "+coin);

    await updateDoc(ref,data);
    updateUI(data);
  }
};

/* SELL */
window.sell = async ()=>{
  let coin = coinSel();
  let amt = Number(amount());

  let ref = doc(db,"users",currentUser.uid);
  let snap = await getDoc(ref);

  let data = snap.data();

  if(data.assets[coin] >= amt){
    data.assets[coin] -= amt;
    data.balance += market[coin]*amt;

    orders.push("SELL "+amt+" "+coin);

    await updateDoc(ref,data);
    updateUI(data);
  }
};

function coinSel(){ return document.getElementById("coin").value; }
function amount(){ return document.getElementById("amount").value; }
</script>

</body>
</html>
