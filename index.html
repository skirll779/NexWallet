<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexWallet</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
  text-align: center;
}

input {
  padding: 10px;
  margin: 5px;
  border-radius: 6px;
  border: none;
  width: 200px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  background: #00e5ff;
  font-weight: bold;
}

.card {
  background: #111c33;
  padding: 20px;
  margin: 20px auto;
  width: 300px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>🚀 NexWallet</h1>

<!-- AUTH -->
<div id="auth">
  <h3>Login / Register</h3>
  <input id="email" type="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="app" style="display:none;">
  <h3>Dashboard</h3>
  <p id="user"></p>

  <div class="card">
    <h2>Balance: $<span id="balance">0</span></h2>

    <button onclick="deposit()">+100 Deposit</button>
    <button onclick="trade()">Trade</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 TU CONFIG FIREBASE (EL TUYO) */
const firebaseConfig = {
  apiKey: "AIzaSyD2e9BtERsCm6n6mAlj6Ll6c7GMcWzc0uE",
  authDomain: "nexwallet-312d9.firebaseapp.com",
  projectId: "nexwallet-312d9",
  storageBucket: "nexwallet-312d9.firebasestorage.app",
  messagingSenderId: "1070652152586",
  appId: "1:1070652152586:web:e82236c52d783b06d578f3",
  measurementId: "G-QHRD1ZWJYH"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

/* REGISTER */
window.register = async () => {
  const userCred = await createUserWithEmailAndPassword(auth, email.value, password.value);

  await setDoc(doc(db, "users", userCred.user.uid), {
    balance: 0
  });

  alert("Account created!");
};

/* LOGIN */
window.login = async () => {
  await signInWithEmailAndPassword(auth, email.value, password.value);
};

/* LOGOUT */
window.logout = () => signOut(auth);

/* SESSION */
onAuthStateChanged(auth, async (user) => {
  if (user) {
    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("user").innerText = user.email;

    const ref = doc(db, "users", user.uid);
    const snap = await getDoc(ref);

    document.getElementById("balance").innerText = snap.data().balance;
  } else {
    document.getElementById("auth").style.display = "block";
    document.getElementById("app").style.display = "none";
  }
});

/* DEPOSIT */
window.deposit = async () => {
  const user = auth.currentUser;
  const ref = doc(db, "users", user.uid);

  const snap = await getDoc(ref);
  let balance = snap.data().balance + 100;

  await updateDoc(ref, { balance });

  document.getElementById("balance").innerText = balance;
};

/* TRADE SIMULATION */
window.trade = async () => {
  const user = auth.currentUser;
  const ref = doc(db, "users", user.uid);

  const snap = await getDoc(ref);
  let balance = snap.data().balance;

  balance += Math.random() > 0.5 ? 50 : -30;

  await updateDoc(ref, { balance });

  document.getElementById("balance").innerText = balance;
};
</script>

</body>
</html>
